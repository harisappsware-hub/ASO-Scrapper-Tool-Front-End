<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASO Intelligence — Keyword Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0F1117;--s1:#161B27;--s2:#1E2535;--s3:#252D40;
    --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
    --t1:#E8EDF5;--t2:#8B93A8;--t3:#4A5268;
    --blue:#4F8EF7;--green:#22D3A0;--red:#F75F5F;
    --yellow:#F7C948;--purple:#A855F7;--orange:#F7853A;
    --fn:'Inter',system-ui,sans-serif;
  }
  body{background:var(--bg);color:var(--t1);font-family:var(--fn);font-size:14px;min-height:100vh;}
  a{color:var(--blue);text-decoration:none;}
  button{font-family:var(--fn);cursor:pointer;border:none;outline:none;}
  input,select{font-family:var(--fn);outline:none;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:var(--b2);border-radius:9px;}

  /* ── LAYOUT ── */
  .app-wrap{display:flex;min-height:100vh;}
  .sidebar{width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);padding:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
  .main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
  .topbar{height:56px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:40;}
  .page-content{padding:24px;flex:1;}

  /* ── SIDEBAR ── */
  .sb-brand{padding:18px 16px;border-bottom:1px solid var(--b1);}
  .sb-brand-name{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;}
  .sb-brand-name span{color:var(--blue);}
  .sb-brand-sub{font-size:.58rem;color:var(--t3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
  .sb-nav{padding:10px 8px;flex:1;}
  .sb-group{font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:0 9px;margin:14px 0 4px;}
  .sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;color:var(--t2);font-size:.84rem;font-weight:500;cursor:pointer;transition:all .12s;margin-bottom:1px;}
  .sb-item:hover{background:var(--s2);color:var(--t1);}
  .sb-item.active{background:rgba(79,142,247,.15);color:var(--blue);font-weight:600;}
  .sb-item-icon{font-size:15px;width:17px;text-align:center;}
  .sb-badge{margin-left:auto;font-size:.58rem;font-weight:800;padding:2px 6px;border-radius:99px;background:var(--blue);color:#fff;}
  .sb-footer{padding:12px 8px;border-top:1px solid var(--b1);}
  .api-status{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;background:var(--s2);font-size:.75rem;color:var(--t2);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .status-dot.offline{background:var(--red);}

  /* ── TOPBAR ── */
  .tb-title{font-size:.95rem;font-weight:700;}
  .tb-sub{font-size:.72rem;color:var(--t2);}
  .tb-sp{flex:1;}
  .tb-badge{font-size:.7rem;background:var(--blue);color:#fff;padding:3px 10px;border-radius:99px;font-weight:600;}

  /* ── BUTTONS ── */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .13s;}
  .btn:active{transform:scale(.96);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
  .btn-blue{background:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(79,142,247,.3);}
  .btn-blue:hover{filter:brightness(1.08);}
  .btn-green{background:var(--green);color:#000;font-weight:700;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-ghost{background:var(--s2);color:var(--t2);border:1px solid var(--b2);}
  .btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
  .btn-sm{padding:5px 11px;font-size:.74rem;}

  /* ── CARDS ── */
  .card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;}
  .card-hd{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .card-title{font-weight:700;font-size:.88rem;}
  .card-body{padding:18px;}

  /* ── STAT CARDS ── */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;}
  .stat-card.blue::before{background:var(--blue);}
  .stat-card.green::before{background:var(--green);}
  .stat-card.yellow::before{background:var(--yellow);}
  .stat-card.purple::before{background:var(--purple);}
  .stat-card.red::before{background:var(--red);}
  .stat-label{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
  .stat-val{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
  .stat-sub{font-size:.68rem;color:var(--t2);margin-top:3px;}

  /* ── TABLE ── */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{padding:9px 14px;text-align:left;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);background:var(--s2);border-bottom:1px solid var(--b1);}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--b1);font-size:.83rem;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(79,142,247,.04);}
  .mono{font-family:'JetBrains Mono','Courier New',monospace;font-size:.78rem;}

  /* ── BADGES ── */
  .bx{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:.62rem;font-weight:700;}
  .bx-blue{background:rgba(79,142,247,.15);color:var(--blue);}
  .bx-green{background:rgba(34,211,160,.12);color:var(--green);}
  .bx-red{background:rgba(247,95,95,.12);color:var(--red);}
  .bx-yellow{background:rgba(247,201,72,.12);color:var(--yellow);}
  .bx-purple{background:rgba(168,85,247,.12);color:var(--purple);}
  .bx-gray{background:var(--s3);color:var(--t2);}

  /* ── DIFFICULTY BAR ── */
  .diff-bar{display:flex;align-items:center;gap:7px;}
  .diff-track{width:70px;height:6px;background:var(--s3);border-radius:99px;overflow:hidden;flex-shrink:0;}
  .diff-fill{height:100%;border-radius:99px;transition:width .3s;}
  .diff-num{font-size:.72rem;font-weight:700;min-width:24px;}

  /* ── INPUT PAGE ── */
  .input-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px;}
  .input-hero h1{font-size:2.2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:12px;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .input-hero p{font-size:1rem;color:var(--t2);margin-bottom:32px;max-width:480px;line-height:1.6;}
  .url-form{display:flex;gap:10px;width:100%;max-width:600px;margin-bottom:16px;}
  .url-input{flex:1;padding:12px 16px;background:var(--s2);border:1.5px solid var(--b2);border-radius:10px;color:var(--t1);font-size:.9rem;}
  .url-input:focus{border-color:var(--blue);outline:none;}
  .url-input::placeholder{color:var(--t3);}
  .options-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
  .sel-sm{padding:7px 11px;background:var(--s2);border:1.5px solid var(--b2);border-radius:8px;color:var(--t1);font-size:.78rem;}
  .sel-sm:focus{border-color:var(--blue);outline:none;}
  .example-urls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .example-chip{padding:5px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:99px;font-size:.72rem;color:var(--t2);cursor:pointer;transition:all .12s;}
  .example-chip:hover{border-color:var(--blue);color:var(--blue);}

  /* ── LOADING ── */
  .loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
  .spinner{width:44px;height:44px;border:3px solid var(--s3);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-step{font-size:.8rem;color:var(--t2);font-weight:500;}
  .progress-bar{width:280px;height:4px;background:var(--s3);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;animation:progress 3s ease forwards;}
  @keyframes progress{from{width:0%;}to{width:90%;}}

  /* ── APP INFO HEADER ── */
  .app-header{display:flex;align-items:center;gap:16px;padding:20px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;margin-bottom:20px;}
  .app-icon{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
  .app-title{font-size:1.2rem;font-weight:800;margin-bottom:4px;}
  .app-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
  .app-meta-item{display:flex;align-items:center;gap:4px;font-size:.75rem;color:var(--t2);}
  .app-actions{margin-left:auto;display:flex;gap:8px;}
  .demo-warn{background:rgba(247,201,72,.1);border:1px solid rgba(247,201,72,.3);border-radius:8px;padding:10px 14px;font-size:.78rem;color:var(--yellow);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

  /* ── KEYWORD TABLE EXTRAS ── */
  .kw-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .search-input{padding:7px 12px;background:var(--s2);border:1.5px solid var(--b2);border-radius:8px;color:var(--t1);font-size:.8rem;width:200px;}
  .search-input:focus{border-color:var(--blue);outline:none;}
  .tab-pills{display:flex;gap:0;background:var(--s2);border-radius:8px;padding:2px;}
  .tab-pill{padding:5px 12px;border-radius:6px;font-size:.74rem;font-weight:600;cursor:pointer;color:var(--t2);transition:all .12s;}
  .tab-pill.active{background:var(--blue);color:#fff;}

  /* ── CHANGES ── */
  .change-section{margin-bottom:20px;}
  .change-header{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .change-pill{display:inline-flex;align-items:center;padding:5px 12px;border-radius:8px;font-size:.78rem;font-weight:600;margin:3px;}
  .change-added{background:rgba(34,211,160,.12);color:var(--green);border:1px solid rgba(34,211,160,.2);}
  .change-removed{background:rgba(247,95,95,.12);color:var(--red);border:1px solid rgba(247,95,95,.2);}
  .change-modified{background:rgba(247,201,72,.12);color:var(--yellow);border:1px solid rgba(247,201,72,.2);}

  /* ── COMPETITOR ── */
  .comp-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:12px;}
  .comp-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .comp-icon{width:38px;height:38px;border-radius:9px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .comp-title{font-weight:700;font-size:.88rem;}
  .comp-meta{font-size:.7rem;color:var(--t2);}
  .kw-pills-wrap{display:flex;gap:4px;flex-wrap:wrap;}
  .kw-pill{padding:3px 9px;border-radius:99px;font-size:.68rem;font-weight:600;}
  .kw-overlap{background:rgba(79,142,247,.12);color:var(--blue);}
  .kw-gap{background:rgba(247,95,95,.1);color:var(--red);}

  /* ── NGRAM TABS ── */
  .ngram-tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:16px;}
  .ngram-tab{padding:10px 18px;font-size:.8rem;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;}
  .ngram-tab.active{color:var(--blue);border-bottom-color:var(--blue);}

  /* ── CHART ── */
  .chart-wrap{height:240px;margin-top:4px;}

  /* ── EMPTY STATE ── */
  .empty{text-align:center;padding:50px 20px;color:var(--t3);}
  .empty-icon{font-size:40px;margin-bottom:10px;opacity:.4;}

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    .sidebar{display:none;}
    .main{margin-left:0;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════
//  MINI REACT-LIKE STATE MANAGER
// ═══════════════════════════════════════════════════
const API_BASE = 'http://localhost:8000';

let state = {
  page: 'home',       // home | loading | dashboard | changes | competitors | history
  loading: false,
  loadingStep: 'Fetching app data...',
  loadingProgress: 0,
  appData: null,
  keywords: null,
  changes: null,
  competitors: [],
  history: [],
  error: null,
  apiOnline: false,
  country: 'us',
  language: 'en',
  includeCompetitors: true,
  ngramTab: 'unigrams',
  kwSearch: '',
  kwSortBy: 'relevance',
  kwPage: 1,
  demoMode: false,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ═══════════════════════════════════════════════════
//  API LAYER
// ═══════════════════════════════════════════════════
async function checkAPI() {
  try {
    const r = await fetch(API_BASE + '/health', { signal: AbortSignal.timeout(3000) });
    setState({ apiOnline: r.ok });
  } catch {
    setState({ apiOnline: false });
  }
}

async function analyzeApp(url) {
  setState({
    page: 'loading', loading: true, error: null,
    loadingStep: '🔍 Fetching app data from Google Play...',
  });

  const steps = [
    '🔍 Fetching app data from Google Play...',
    '🧠 Extracting and analyzing keywords...',
    '📊 Estimating keyword rankings...',
    '⚔️ Calculating keyword difficulty...',
    '🏆 Analyzing competitor apps...',
    '💾 Saving snapshot & detecting changes...',
  ];

  let stepIdx = 0;
  const stepTimer = setInterval(() => {
    stepIdx = Math.min(stepIdx + 1, steps.length - 1);
    setState({ loadingStep: steps[stepIdx] });
  }, 2000);

  try {
    let data;
    if (!state.apiOnline) {
      // Demo mode — generate mock data
      await new Promise(r => setTimeout(r, 3000));
      data = generateDemoData(url);
      setState({ demoMode: true });
    } else {
      const resp = await fetch(API_BASE + '/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url, country: state.country, language: state.language,
          include_competitors: state.includeCompetitors, track_changes: true
        })
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || 'Analysis failed');
      }
      data = await resp.json();
      setState({ demoMode: false });
    }

    setState({
      page: 'dashboard',
      loading: false,
      appData: data.app,
      keywords: data.keywords,
      changes: data.changes,
      competitors: data.competitors || [],
    });
  } catch (e) {
    setState({ page: 'home', loading: false, error: e.message });
  } finally {
    clearInterval(stepTimer);
  }
}

async function exportCSV() {
  if (!state.keywords) return;
  const rows = [['Keyword','Type','Frequency','Density %','Rank','Difficulty','In Title','In Short Desc']];
  const types = ['unigrams','bigrams','trigrams'];
  types.forEach(t => {
    (state.keywords[t] || []).forEach(k => {
      rows.push([
        k.keyword, t.slice(0,-1),
        k.count, k.density.toFixed(4),
        k.rank || 'N/A', k.difficulty || 0,
        k.in_title ? 'Yes' : 'No', k.in_short ? 'Yes' : 'No'
      ]);
    });
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `aso_report_${state.appData?.app_id || 'export'}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════════
//  DEMO DATA GENERATOR
// ═══════════════════════════════════════════════════
function generateDemoData(url) {
  const appId = url.match(/id=([^&]+)/)?.[1] || 'com.example.app';

  const makeKws = (words, type) => words.map((w, i) => ({
    keyword: w, count: Math.max(1, Math.floor(20 - i * 0.6)),
    density: parseFloat((2.5 - i * 0.08).toFixed(4)),
    relevance: 3 - i * 0.05, in_title: i < 3, in_short: i < 6,
    ngram: type === 'unigrams' ? 1 : type === 'bigrams' ? 2 : 3,
    rank: i < 5 ? (i + 1) * 3 : (i < 10 ? i * 4 + 10 : null),
    rank_status: i < 5 ? 'Ranking' : i < 10 ? 'Ranking' : 'Not Ranking',
    difficulty: Math.floor(20 + i * 3.5),
    competitor_count: Math.floor(8 + i * 1.2),
    stem: w,
  }));

  return {
    app: {
      app_id: appId, title: 'Sample Productivity App', developer: 'Demo Studio',
      category: 'Productivity', rating: 4.8, installs: '5,000,000+',
      version: '3.2.1', last_updated: 'January 2025', icon_url: '', is_demo: true,
      short_description: 'Ultimate task manager & productivity booster',
      long_description: 'Full description here...',
    },
    keywords: {
      unigrams: makeKws(['task','productivity','manager','organizer','planner',
        'schedule','workflow','project','reminder','calendar',
        'tracker','sync','collaboration','deadline','priority',
        'checklist','goals','efficiency','performance','dashboard'], 'unigrams'),
      bigrams: makeKws(['task manager','project management','team collaboration',
        'workflow automation','daily planner','time tracker',
        'smart reminder','goal tracking','progress tracker','deadline management'], 'bigrams'),
      trigrams: makeKws(['personal task manager','project management tool',
        'team collaboration app','workflow automation software',
        'daily goal tracker'], 'trigrams'),
      stats: { total_words: 450, unique_words: 280, avg_top10_density: 1.8, language: 'en' }
    },
    changes: {
      is_first: false,
      added: [{keyword:'workflow',count:3},{keyword:'automation',count:2},{keyword:'dashboard',count:1}],
      removed: [{keyword:'application',count:2},{keyword:'simple',count:1}],
      changed: [{keyword:'task',old:18,new:22,delta:4},{keyword:'manager',old:12,new:15,delta:3}],
      added_count: 3, removed_count: 2, changed_count: 2,
      from_date: new Date(Date.now()-7*86400000).toISOString(),
      to_date: new Date().toISOString(),
    },
    competitors: [
      { app_id:'com.todoist', title:'Todoist: To-Do List & Planner', developer:'Doist',
        rating:4.9, installs:'10,000,000+', overlap_count:12, gap_count:8,
        overlapping_keywords:['task','planner','productivity','organizer','reminder'],
        keyword_gaps:['smart','ai','intelligent','voice'],
        top_keywords:['task','todo','planner','productivity','organize'] },
      { app_id:'com.notion', title:'Notion - Notes & Docs', developer:'Notion Labs',
        rating:4.7, installs:'5,000,000+', overlap_count:9, gap_count:11,
        overlapping_keywords:['project','workspace','notes','team','sync'],
        keyword_gaps:['docs','wiki','database','template'],
        top_keywords:['notes','docs','project','wiki','workspace'] },
    ],
    analyzed_at: new Date().toISOString(),
  };
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function diffColor(score) {
  if (score < 30) return 'var(--green)';
  if (score < 60) return 'var(--yellow)';
  return 'var(--red)';
}
function rankBadge(rank, status) {
  if (!rank) return `<span class="bx bx-gray">${status || 'Not Ranking'}</span>`;
  const cls = rank <= 10 ? 'bx-green' : rank <= 30 ? 'bx-yellow' : 'bx-red';
  return `<span class="bx ${cls}">#${rank}</span>`;
}
function fmt(n) { return n?.toLocaleString() || 'N/A'; }
function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff/86400000);
  if (d === 0) return 'today';
  if (d === 1) return 'yesterday';
  return `${d} days ago`;
}

// Filtered keywords
function getKws() {
  if (!state.keywords) return [];
  let kws = state.keywords[state.ngramTab] || [];
  if (state.kwSearch) {
    const q = state.kwSearch.toLowerCase();
    kws = kws.filter(k => k.keyword.includes(q));
  }
  if (state.kwSortBy === 'frequency') kws = [...kws].sort((a,b)=>b.count-a.count);
  else if (state.kwSortBy === 'density') kws = [...kws].sort((a,b)=>b.density-a.density);
  else if (state.kwSortBy === 'rank') kws = [...kws].sort((a,b)=>(a.rank||999)-(b.rank||999));
  else if (state.kwSortBy === 'difficulty') kws = [...kws].sort((a,b)=>b.difficulty-a.difficulty);
  else kws = [...kws].sort((a,b)=>b.relevance-a.relevance);
  return kws;
}

function renderBarChart() {
  const kws = (state.keywords?.[state.ngramTab] || []).slice(0, 10);
  if (!kws.length) return '<div class="empty"><div class="empty-icon">📊</div>No data</div>';

  const maxCount = Math.max(...kws.map(k=>k.count));
  const barH = 180;

  const bars = kws.map((k, i) => {
    const h = Math.round((k.count / maxCount) * barH);
    const x = i * 54 + 20;
    const y = barH - h + 20;
    const colors = ['#4F8EF7','#A855F7','#22D3A0','#F7C948','#F75F5F','#F7853A','#4F8EF7','#A855F7','#22D3A0','#F7C948'];
    const w = 36;
    const label = k.keyword.length > 8 ? k.keyword.slice(0,7)+'…' : k.keyword;
    return `
      <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${colors[i%10]}" opacity=".8"/>
      <text x="${x+w/2}" y="${y-5}" text-anchor="middle" fill="#8B93A8" font-size="10">${k.count}</text>
      <text x="${x+w/2}" y="${barH+35}" text-anchor="middle" fill="#8B93A8" font-size="9" transform="rotate(-25,${x+w/2},${barH+35})">${label}</text>`;
  });

  return `
    <svg width="100%" viewBox="0 0 580 220" style="max-height:220px;">
      ${bars.join('')}
      <line x1="10" y1="${barH+20}" x2="570" y2="${barH+20}" stroke="#1E2535" stroke-width="1"/>
    </svg>`;
}

function renderScatterChart() {
  const kws = (state.keywords?.unigrams || []).slice(0, 25);
  if (!kws.length) return '<div class="empty">No data</div>';

  const maxCount = Math.max(...kws.map(k=>k.count));
  const W = 300, H = 180;

  const dots = kws.map(k => {
    const cx = Math.round((k.difficulty||0) / 100 * (W-20)) + 10;
    const cy = Math.round((1 - k.count/maxCount) * (H-20)) + 10;
    const hasRank = k.rank && k.rank <= 20;
    return `
      <circle cx="${cx}" cy="${cy}" r="${hasRank?6:4}" fill="${hasRank?'var(--green)':'var(--blue)'}" opacity=".75"/>
      ${hasRank?`<text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#8B93A8" font-size="8">${k.keyword.slice(0,6)}</text>`:''}`;
  });

  return `
    <svg width="100%" viewBox="0 0 ${W+40} ${H+40}" style="max-height:220px;">
      <text x="10" y="${H/2}" fill="#4A5268" font-size="9" transform="rotate(-90,10,${H/2})">Frequency ↑</text>
      <text x="${W/2}" y="${H+35}" text-anchor="middle" fill="#4A5268" font-size="9">Difficulty →</text>
      <line x1="20" y1="10" x2="20" y2="${H+10}" stroke="#1E2535" stroke-width="1"/>
      <line x1="20" y1="${H+10}" x2="${W+20}" y2="${H+10}" stroke="#1E2535" stroke-width="1"/>
      ${dots.join('')}
      <circle cx="30" cy="${H+30}" r="4" fill="var(--green)"/>
      <text x="38" y="${H+34}" fill="#8B93A8" font-size="8">Ranking</text>
      <circle cx="80" cy="${H+30}" r="4" fill="var(--blue)"/>
      <text x="88" y="${H+34}" fill="#8B93A8" font-size="8">Not Ranking</text>
    </svg>`;
}

      </div>
    </div>
    ${comps.map(c=>`
      <div class="comp-card">
        <div class="comp-hd">
          <div class="comp-icon">🤖</div>
          <div>
            <div class="comp-title">${c.title||c.app_id}</div>
            <div class="comp-meta">${c.developer||''} ${c.rating?'· ⭐'+c.rating:''} ${c.installs?'· '+c.installs:''}</div>
          </div>
          <div style="margin-left:auto;display:flex;gap:8px;">
            <span class="bx bx-blue">${c.overlap_count} shared kws</span>
            <span class="bx bx-red">${c.gap_count} gaps</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <div style="font-size:.68rem;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:6px;">Overlapping Keywords</div>
            <div class="kw-pills-wrap">
              ${(c.overlapping_keywords||[]).map(k=>`<div class="kw-pill kw-overlap">${k}</div>`).join('')}
            </div>
          </div>
          <div>
            <div style="font-size:.68rem;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:6px;">Their Unique Keywords (Gaps)</div>
            <div class="kw-pills-wrap">
              ${(c.keyword_gaps||[]).map(k=>`<div class="kw-pill kw-gap">${k}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>`).join('')}`;
}

// ═══════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════
function render() {
  const pages = {
    home:        renderHome,
    loading:     renderLoading,
    dashboard:   renderDashboard,
    changes:     renderChanges,
    competitors: renderCompetitors,
  };

  const content = (pages[state.page] || renderHome)();

  document.getElementById('root').innerHTML = `
    <div class="app-wrap">
      ${renderSidebar()}
      <div class="main">
        ${renderTopbar()}
        <div class="page-content">${content}</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
render();
checkAPI().then(() => render());
</script>
</body>
</html>
